    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;background:var(--bg);font-family:var(--font);color:var(--brown);-webkit-font-smoothing:antialiased;}
    input,button,select,textarea{font-family:var(--font);}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
    .cs::-webkit-scrollbar{display:none;}
    .cs{-ms-overflow-style:none;scrollbar-width:none;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pop{0%{transform:scale(.93);opacity:0}60%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}
    .fu{animation:fadeUp .3s ease both;}
    .pi{animation:pop .26s cubic-bezier(.34,1.56,.64,1) both;}
    .app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
    .hdr{background:var(--brown);position:sticky;top:0;z-index:20;box-shadow:0 2px 16px rgba(0,0,0,.2);}
    .ht{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;}
    .nr{display:flex;padding:10px 8px 0;gap:2px;}
    .nb{flex:1;background:transparent;border:none;border-radius:12px 12px 0 0;padding:8px 2px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
    .nb.on{background:rgba(255,255,255,.15);}
    .nd{width:18px;height:2.5px;background:#F5A623;border-radius:99px;margin-top:1px;}
    .mn{flex:1;overflow-y:auto;padding-bottom:20px;}
    .pg{padding:14px 14px 0;}
    .cd{background:var(--card);border-radius:20px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px;}
    .pl{background:var(--cream2);color:var(--brown2);border:none;border-radius:99px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .pl.on{background:var(--brown);color:#fff;}
    .bb{display:block;width:100%;border:none;border-radius:16px;padding:15px 20px;font-size:15px;font-weight:800;cursor:pointer;}
    .bb:disabled{opacity:.5;cursor:not-allowed;}
    .ch{border-radius:99px;padding:6px 13px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--brown2);}
    .ch.on{background:var(--green);color:#fff;border-color:var(--green);}
    .ii{border:2px solid var(--border);border-radius:14px;padding:13px 14px;font-size:15px;font-weight:600;background:var(--card);color:var(--brown);outline:none;width:100%;}
    .pb{background:var(--cream);border-radius:99px;height:12px;overflow:hidden;margin-bottom:6px;}
    .pf{height:100%;border-radius:99px;transition:width .6s ease;}
    .rr{display:flex;justify-content:space-between;align-items:center;padding:11px 0;}
    .db{background:var(--redL);border:none;border-radius:99px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--red);font-size:13px;font-weight:800;flex-shrink:0;}
    .nw{position:relative;}
    .nw input{width:100%;border:2px solid var(--border);border-radius:14px;padding:13px 30px 13px 14px;font-size:18px;font-weight:800;background:var(--bg);color:var(--brown);outline:none;text-align:center;}
    .nw .sx{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--brown3);font-weight:700;pointer-events:none;}
    .bbar{height:8px;border-radius:99px;display:flex;overflow:hidden;margin-bottom:4px;}
    .bptr{position:absolute;font-size:15px;transform:translateX(-50%);}
    #loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--brown2);z-index:999;}
  </style>

  // ══ Gemini ════════════════════════════════════════════════════════════════════
  const SYS='你是專業的台灣飲食營養分析師。請辨識食物並以 JSON 格式回傳（不要包含任何 markdown，只有純 JSON）：{"name":"食物名稱（繁體中文）","unit":"份量描述","calories":數字,"protein":數字,"fat":數字,"carbs":數字}';
  function gp(t){return JSON.parse(t.replace(/```json|```/g,'').trim());}
  async function gx(key,body){
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    return gp(d.candidates?.[0]?.content?.parts?.[0]?.text||'');
  }
  function aiImg(k,b,m){return gx(k,{system_instruction:{parts:[{text:SYS}]},contents:[{parts:[{inline_data:{mime_type:m,data:b}},{text:'請分析這個食物圖片並回傳 JSON。'}]}],generationConfig:{temperature:0.2,maxOutputTokens:512}});}
  function aiTxt(k,q){return gx(k,{contents:[{parts:[{text:q}]}],generationConfig:{temperature:0.2,maxOutputTokens:256}});}
  function aiAlts(k,n,c){return gx(k,{contents:[{parts:[{text:'食物「'+n+'」熱量約'+c+'大卡，太高了！以台灣生活圈（7-11、全家、全聯、路邊攤）給出3個低熱量替代品，語氣幽默。回傳純JSON：[{"name":"名稱","where":"在哪買","calories":數字,"reason":"幽默說明"},...]'}]}],generationConfig:{temperature:0.8,maxOutputTokens:512}});}

  // ══ Donut Chart ═══════════════════════════════════════════════════════════════
  function Donut({p,f,k}){
    const tot=p*4+f*9+k*4||1;
    const pp=p*4/tot,fp=f*9/tot,kp=k*4/tot;
    const r=34,cx=50,cy=50;
    function arc(s,pct){
      if(pct<=0)return '';if(pct>=1)pct=0.9999;
      const a1=s*2*Math.PI-Math.PI/2,a2=(s+pct)*2*Math.PI-Math.PI/2;
      return 'M'+cx+' '+cy+'L'+parseFloat(cx+r*Math.cos(a1)).toFixed(1)+' '+parseFloat(cy+r*Math.sin(a1)).toFixed(1)+'A'+r+' '+r+' 0 '+(pct>.5?1:0)+' 1 '+parseFloat(cx+r*Math.cos(a2)).toFixed(1)+' '+parseFloat(cy+r*Math.sin(a2)).toFixed(1)+'Z';
    }
    return h`<svg viewBox="0 0 100 100" width="88" height="88">
      <circle cx="50" cy="50" r="34" fill="var(--cream)"/>
      <path d=${arc(0,pp)} fill="var(--green)"/>
      <path d=${arc(pp,fp)} fill="var(--amber)"/>
      <path d=${arc(pp+fp,kp)} fill="var(--brown)"/>
      <circle cx="50" cy="50" r="20" fill="var(--card)"/>
    </svg>`;
  }

  }

          <div style=${{background:'rgba(255,255,255,.12)',borderRadius:'99px',padding:'6px 14px',display:'flex',alignItems:'center',gap:'6px'}}>
            <span style=${{color:'rgba(255,255,255,.7)',fontSize:'11px',fontWeight:600}}>剩餘</span>
            <span style=${{color:rem<0?'#FF8080':'#8FD9A8',fontSize:'16px',fontWeight:900}}>${rem}</span>
            <span style=${{color:'rgba(255,255,255,.5)',fontSize:'11px'}}>kcal</span>
          </div>
        </div>
        <div class="nr">
          ${navs.map(function(item){var p=item[0],ic=item[1],lb=item[2];return h`<button key=${p} class=${'nb'+(pg===p?' on':'')} onClick=${function(){navGo(p);}}>
            <span style=${{fontSize:p==='add'?'22px':'18px',lineHeight:1}}>${ic}</span>
            <span style=${{fontSize:'11px',fontWeight:pg===p?800:600,color:pg===p?'#fff':'rgba(255,255,255,.5)'}}>${lb}</span>
            ${pg===p&&h`<div class="nd"></div>`}
          </button>`;})}
        </div>
      </header>

      <main class="mn">
        ${pg==='dash'&&h`<div class="pg fu">
          <div class="cd">
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:'14px'}}>
              <div><div style=${{fontSize:'11px',color:'var(--brown2)',fontWeight:700,marginBottom:'4px'}}>今日已攝取熱量</div><div style=${{fontSize:'50px',fontWeight:900,color:rem<0?'var(--red)':'var(--brown)',lineHeight:1}}>${tot.c}</div><div style=${{fontSize:'12px',color:'var(--brown3)',marginTop:'2px'}}>目標 ${tdee} kcal</div></div>
              <div style=${{textAlign:'right'}}><div style=${{fontSize:'11px',color:'var(--brown2)',fontWeight:700}}>尚可攝取</div><div style=${{fontSize:'32px',fontWeight:900,color:rem<0?'var(--red)':'var(--green)',lineHeight:1}}>${rem}</div><div style=${{fontSize:'11px',color:'var(--brown3)'}}>kcal</div></div>
            </div>
            <div class="pb"><div class="pf" style=${{width:pct*100+'%',background:pct>.9?'var(--red)':pct>.7?'var(--amber)':'var(--green)'}}></div></div>
            <div style=${{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'var(--brown3)'}}><span>${Math.round(pct*100)}% 已使用</span><span>${recs.length} 筆紀錄</span></div>
          </div>
          <div class="cd" style=${{display:'flex',alignItems:'center',gap:'14px'}}>
            <${Donut} p=${tot.p} f=${tot.f} k=${tot.k}/>
            <div style=${{flex:1}}>
              ${[['🥩 蛋白質',tot.p,'var(--green)'],['🧈 脂肪',tot.f,'var(--amber)'],['🍚 碳水',tot.k,'var(--brown)']].map(function(x){return h`<div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}} key=${x[0]}><span style=${{fontSize:'12px',color:'var(--brown2)',fontWeight:600}}>${x[0]}</span><span style=${{fontWeight:900,color:x[2],fontSize:'15px'}}>${x[1]} <span style=${{fontSize:'11px',fontWeight:600}}>g</span></span></div>`;})}
            </div>
          </div>
          ${altLd&&h`<div style=${{background:'var(--amberL)',border:'1px solid var(--amber)',borderRadius:'16px',padding:'14px',marginBottom:'12px',textAlign:'center',fontSize:'14px',color:'var(--amber)',fontWeight:700}}>🤔 AI 教練正在想對策…</div>`}
          ${alts&&h`<div class="cd pi" style=${{background:'var(--amberL)',border:'2px solid var(--amber)'}}>
            <div style=${{fontWeight:900,fontSize:'15px',color:'var(--amber)',marginBottom:'4px'}}>⚠️ 熱量有點高喔！</div>
            <div style=${{fontSize:'13px',color:'var(--brown2)',marginBottom:'12px'}}>AI 教練推薦台灣生活圈好選擇：</div>
            ${alts.map(function(a,i){return h`<div style=${{background:'var(--white)',borderRadius:'14px',padding:'12px 14px',marginBottom:'8px',border:'1px solid var(--border)',display:'flex',gap:'10px',alignItems:'center'}} key=${i}>
              <div style=${{flex:1}}><div style=${{fontWeight:800,fontSize:'14px'}}>${a.name} <span style=${{fontSize:'11px',color:'var(--brown3)',fontWeight:500}}>${a.calories} kcal</span></div><div style=${{fontSize:'11px',color:'var(--green)',marginTop:'2px',fontWeight:600}}>📍 ${a.where}</div><div style=${{fontSize:'11px',color:'var(--brown2)',marginTop:'3px'}}>${a.reason}</div></div>
              <button onClick=${function(){repAlt(a);}} style=${{background:'var(--green)',color:'#fff',border:'none',borderRadius:'12px',padding:'8px 12px',fontSize:'12px',fontWeight:800,cursor:'pointer',whiteSpace:'nowrap'}}>替換</button>
            </div>`;},this)}
            <button onClick=${function(){setAlts(null);}} style=${{width:'100%',background:'none',border:'none',color:'var(--brown3)',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>今天就這樣吧 🤷</button>
          </div>`}
          <div class="cd">
            <div style=${{fontWeight:900,fontSize:'15px',marginBottom:'12px'}}>📋 今日飲食紀錄</div>
            ${recs.length===0&&h`<div style=${{textAlign:'center',padding:'24px 0',color:'var(--brown3)'}}><div style=${{fontSize:'34px',marginBottom:'8px'}}>🍽️</div><div style=${{fontSize:'14px',fontWeight:600}}>還沒有紀錄，快去新增吧！</div></div>`}
            ${recs.map(function(r,i){return h`<div class="rr" key=${r.id} style=${{borderBottom:i<recs.length-1?'1px solid var(--border)':'none'}}>
              <div style=${{flex:1,minWidth:0}}><div style=${{fontWeight:800,fontSize:'14px',marginBottom:'2px'}}>${r.name}</div><div style=${{fontSize:'11px',color:'var(--brown3)'}}>${r.unit} · 蛋白 ${r.p}g · 脂 ${r.f}g · 碳水 ${r.k}g</div></div>
              <div style=${{display:'flex',alignItems:'center',gap:'6px',marginLeft:'8px'}}><span style=${{fontWeight:900,fontSize:'16px',color:'var(--brown)'}}>${r.c}</span><span style=${{fontSize:'10px',color:'var(--brown3)',marginLeft:'2px'}}>kcal</span><button class="db" onClick=${function(){setRecs(function(p){return p.filter(function(x){return x.id!==r.id;});});}}>✕</button></div>
            </div>`;},this)}
          </div>
        </div>`}

        ${pg==='add'&&h`<div class="pg fu">
          <div style=${{display:'flex',gap:'8px',marginBottom:'10px'}}>
            <div style=${{flex:1,position:'relative'}}>
              <input class="ii" value=${inp} onInput=${function(e){onInp(e.target.value);}} onKeyDown=${function(e){if(e.key==='Enter')doSrch();}} placeholder="搜尋食物名稱…"/>
              ${inp&&h`<button onClick=${function(){setInp('');setHits([]);setFood(null);}} style=${{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--brown3)',cursor:'pointer',fontSize:'16px'}}>✕</button>`}
            </div>
            <div style=${{position:'relative',width:'82px'}}><input type="number" value=${gr} onInput=${function(e){onGr(e.target.value);}} placeholder="100" style=${{border:'2px solid var(--border)',borderRadius:'14px',padding:'13px 24px 13px 10px',fontSize:'15px',fontWeight:600,background:'var(--card)',color:'var(--brown)',outline:'none',width:'100%',textAlign:'right'}}/><span style=${{position:'absolute',right:'8px',top:'50%',transform:'translateY(-50%)',fontSize:'11px',color:'var(--brown3)',fontWeight:700,pointerEvents:'none'}}>g</span></div>
            <button onClick=${doSrch} style=${{background:'var(--brown)',color:'#fff',border:'none',borderRadius:'14px',padding:'0 16px',cursor:'pointer',fontSize:'18px',flexShrink:0}}>🔍</button>
          </div>
          ${hits.length>0&&h`<div class="cd pi" style=${{padding:0,overflow:'hidden',marginBottom:'10px'}}>
            ${hits.map(function(n,i){return h`<div key=${n} onClick=${function(){pickF(n);}} style=${{padding:'12px 16px',borderBottom:i<hits.length-1?'1px solid var(--border)':'none',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style=${{fontWeight:700,fontSize:'14px'}}>${n}</span><span style=${{fontSize:'11px',color:'var(--brown3)',background:'var(--cream)',borderRadius:'99px',padding:'3px 10px',fontWeight:600}}>${DB[n].c} kcal/100g</span></div>`;},this)}
          </div>`}
          <div class="cs" style=${{display:'flex',gap:'6px',overflowX:'auto',marginBottom:'10px',paddingBottom:'2px'}}>
            ${Object.keys(CATS).map(function(c){return h`<button key=${c} class=${'pl'+(cat===c?' on':'')} onClick=${function(){setCat(c);}}>${c}</button>`;})}
          </div>
          <div style=${{display:'flex',flexWrap:'wrap',gap:'7px',marginBottom:'16px'}}>
            ${CATS[cat].map(function(n){return h`<button key=${n} class=${'ch'+(food&&food.name===n?' on':'')} onClick=${function(){pickF(n);}}>${n}</button>`;},this)}
          </div>
          <div onClick=${function(){if(fref.current)fref.current.click();}} style=${{background:'var(--card)',border:'2px dashed var(--border)',borderRadius:'20px',padding:'20px',textAlign:'center',cursor:'pointer',marginBottom:'12px'}}>
            ${img?h`<img src=${img} alt="preview" style=${{maxHeight:'160px',borderRadius:'14px',objectFit:'cover'}}/>`:h`<div style=${{color:'var(--brown3)'}}><div style=${{fontSize:'34px',marginBottom:'6px'}}>📷</div><div style=${{fontWeight:800,fontSize:'14px'}}>拍照 AI 辨識</div><div style=${{fontSize:'12px',marginTop:'3px'}}>點此上傳食物照片</div></div>`}
          </div>
          <input ref=${fref} type="file" accept="image/*" style=${{display:'none'}} onChange=${onImg}/>
          ${load&&h`<div style=${{textAlign:'center',padding:'20px'}}><div style=${{fontSize:'30px',animation:'spin 1s linear infinite',display:'inline-block'}}>🌀</div><div style=${{marginTop:'8px',color:'var(--brown2)',fontWeight:600,fontSize:'13px'}}>AI 分析中…</div></div>`}
          ${err&&h`<div style=${{background:'var(--redL)',border:'1px solid var(--red)',borderRadius:'14px',padding:'12px',color:'var(--red)',fontSize:'13px',fontWeight:700,marginBottom:'12px'}}>${err}</div>`}
          ${food&&!load&&h`<div class="cd pi" style=${{border:'2px solid var(--green)'}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'}}><div style=${{fontWeight:900,fontSize:'18px'}}>${food.name}</div><div style=${{fontSize:'11px',color:'var(--brown3)',background:'var(--cream)',borderRadius:'99px',padding:'3px 10px',fontWeight:700,flexShrink:0,marginLeft:'8px'}}>📋 衛福部資料</div></div>
            <div style=${{fontSize:'12px',color:'var(--brown3)',marginBottom:'14px',fontWeight:600}}>${food.unit}</div>
            <div style=${{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'8px',marginBottom:'16px'}}>
              ${[['熱量',food.c,'kcal','var(--brown)'],['蛋白質',food.p,'g','var(--green)'],['脂肪',food.f,'g','var(--amber)'],['碳水',food.k,'g','var(--brown2)']].map(function(x){return h`<div key=${x[0]} style=${{background:'var(--cream2)',borderRadius:'14px',padding:'10px 4px',textAlign:'center'}}><div style=${{fontSize:'18px',fontWeight:900,color:x[3],lineHeight:1.1}}>${x[1]}</div><div style=${{fontSize:'9px',color:'var(--brown3)',marginTop:'1px'}}>${x[2]}</div><div style=${{fontSize:'10px',color:'var(--brown2)',marginTop:'2px',fontWeight:600}}>${x[0]}</div></div>`;},this)}
            </div>
            <button class="bb" onClick=${function(){addRec(food);}} style=${{background:'var(--green)',color:'#fff'}}>✅ 加入今日紀錄</button>
          </div>`}
        </div>`}

        ${pg==='body'&&h`<${BodyPage}/>`}

        ${pg==='settings'&&h`<div class="pg fu">
          <div class="cd">
            <div style=${{fontWeight:900,fontSize:'15px',marginBottom:'16px'}}>個人設定</div>
            ${[
              {lb:'🔑 Gemini API Key',v:gkey,s:setGkey,t:'password',ph:'貼上你的 API Key',sfx:null},
              {lb:'🔥 每日目標熱量（TDEE）',v:tdee,s:function(v){setTdee(Number(v));},t:'number',ph:'2000',sfx:'kcal'},
              {lb:'⚠️ 單餐預警熱量',v:warn,s:function(v){setWarn(Number(v));},t:'number',ph:'500',sfx:'kcal'},
            ].map(function(item){return h`<div key=${item.lb} style=${{marginBottom:'16px'}}>
              <label style=${{display:'block',fontWeight:800,marginBottom:'8px',fontSize:'13px',color:'var(--brown2)'}}>${item.lb}</label>
              <div style=${{position:'relative'}}><input type=${item.t} value=${item.v} onInput=${function(e){item.s(e.target.value);}} placeholder=${item.ph} class="ii" style=${{paddingRight:item.sfx?'52px':'14px'}}/>${item.sfx&&h`<span style=${{position:'absolute',right:'14px',top:'50%',transform:'translateY(-50%)',fontSize:'12px',color:'var(--brown3)',fontWeight:700,pointerEvents:'none'}}>${item.sfx}</span>`}</div>
            </div>`;},this)}
            <button class="bb" onClick=${saveSt} style=${{background:'var(--brown)',color:'#fff'}}>💾 儲存設定</button>
          </div>
          <div class="cd" style=${{background:'var(--greenL)',border:'1px solid #C8DFD0'}}>
            <div style=${{fontWeight:800,fontSize:'13px',color:'var(--green)',marginBottom:'8px'}}>🗂️ 食物資料來源</div>
            <div style=${{fontSize:'12px',color:'var(--brown2)',lineHeight:1.7}}>本 App 收錄台灣衛福部「食品營養成分資料庫 2024」170 種日常食物，數值基準為每 100g 可食部分。</div>
          </div>
          <div class="cd" style=${{background:'var(--amberL)',border:'1px solid #E8CCAA'}}>
            <div style=${{fontWeight:800,fontSize:'13px',color:'var(--amber)',marginBottom:'8px'}}>💡 如何取得免費 Gemini API Key？</div>
            <div style=${{fontSize:'12px',color:'var(--brown2)',lineHeight:1.7}}>前往 <b>aistudio.google.com</b> → 登入 Google 帳號 → 點選「Get API Key」即可免費使用 Gemini 1.5 Flash。</div>
          </div>
          <button class="bb" onClick=${function(){if(confirm('確定清除今日所有飲食紀錄？')){setRecs([]);setPg('dash');}}} style=${{background:'transparent',color:'var(--red)',border:'2px solid var(--red)',marginTop:'4px'}}>🗑️ 清除今日飲食紀錄</button>
        </div>`}
      </main>
    </div>`;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
})();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js')
      .then(function(r){console.log('[SW] ok');})
      .catch(function(e){console.warn('[SW] fail:',e);});
  });
}
</script>
</body>
</html>
